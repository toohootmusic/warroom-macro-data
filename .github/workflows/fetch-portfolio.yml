===INÍCIO DO ARQUIVO===

```
name: Fetch Portfolio Prices

on:
  schedule:
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch portfolio prices
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: node scripts/fetch-portfolio.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/portfolio-latest.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            BRT_TIME=$(TZ=America/Sao_Paulo date +"%Y-%m-%d %H:%M BRT")
            git commit -m "portfolio: update at $BRT_TIME"
            git push
          fi

```

===FIM DO ARQUIVO===
